site_name: Lenny Guides
site_description: Practical guides for safe, effective AI-coding-agent workflows.
site_url: https://lennertvhoy.github.io/Lenny_Guides/
repo_url: https://github.com/lennertvhoy/Lenny_Guides
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Open Sans
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

extra_css:
  - assets/css/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: nl
          name: Nederlands
          build: true

nav:
  - Home: index.md
  - Getting Started:
      - Student Setup: getting-started/student-setup.md
  - Guides:
      - Herdr: guides/herdr.md
      - Tailscale: guides/tailscale.md
      - Termux: guides/termux.md
      - StudyState: guides/studydd.md
      - StateSpec: guides/statedd.md
      - Stateware naming: guides/naming.md
  - Safety:
      - Boundaries: safety/boundaries.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lennertvhoy/Lenny_Guides
